<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PickHue — Magnifier</title>
    <link rel="stylesheet" href="scene.css" />
  </head>
  <body>
    <div class="mock-page">
      <div class="mock-page__hero"></div>
      <div class="mock-page__content">
        <h1 class="mock-page__title">Pixel-precise picking</h1>
        <p class="mock-page__body">
          A circular magnifier follows your cursor so you always pick the exact
          pixel you mean.
        </p>
      </div>
      <div class="mock-page__blocks">
        <div class="mock-page__block" style="background: #fb923c"></div>
        <div class="mock-page__block" style="background: #f472b6"></div>
        <div class="mock-page__block" style="background: #6366f1"></div>
      </div>
    </div>

    <div class="pickhue-loupe">
      <div class="pickhue-loupe__glass">
        <div class="pickhue-loupe__lens"></div>
        <div class="pickhue-loupe__reticle"></div>
      </div>
      <div class="pickhue-loupe__info">
        <span class="pickhue-loupe__dot"></span>
        <span class="pickhue-loupe__hex">#FB923C</span>
      </div>
    </div>

    <p class="pickhue-picker__hint">
      <b>Click</b> to pick &middot; <b>Esc</b> to cancel
    </p>
  </body>
</html>
